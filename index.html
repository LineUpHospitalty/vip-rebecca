<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rebecca VIP</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #05070d, #0b0f1a);
  color: #fff;
  font-family: 'Inter', sans-serif;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 25px;
}

/* LOGO */
.logo {
  text-align: center;
  margin-bottom: 20px;
}

.logo img {
  width: 180px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
}

/* INPUTS */
input, select {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: white;
}

/* BOTÓN */
button {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg, #00f0ff, #8a2eff);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* VIP TABS */
.vip-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 15px;
}

.vip-tab {
  padding: 12px;
  border: 1px solid rgba(255,209,102,0.4);
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
}

.vip-tab.active {
  background: rgba(255,209,102,0.2);
}

/* MAPA */
.mapa {
  position: relative;
  margin-top: 15px;
}

.mapa img {
  width: 100%;
  border-radius: 10px;
}

/* ZONAS VIP */
.vip-zone {
  position: absolute;
  border: 2px solid rgba(0,240,255,0.4);
  border-radius: 10px;
  cursor: pointer;
}

.vip-zone.active {
  background: rgba(0,240,255,0.2);
}

/* POSICIÓN 2x2 */
#z1 { top:10%; left:15%; width:25%; height:25%; }
#z2 { top:10%; right:15%; width:25%; height:25%; }
#z3 { bottom:10%; left:15%; width:25%; height:25%; }
#z4 { bottom:10%; right:15%; width:25%; height:25%; }

</style>
</head>

<body>

<div class="container">

<!-- LOGO -->
<div class="logo">
  <img src="logo.png">
</div>

<div class="card">

<form>

<input type="text" id="nombre" placeholder="Nombre completo" required>

<input type="number" id="personas" placeholder="Cantidad de personas" required>

<select id="fechaEvento" required>
<option value="">Selecciona fecha</option>
<option>Jueves</option>
<option>Viernes</option>
<option>Sábado</option>
</select>

<input type="hidden" id="zona">

<!-- BOTONES VIP -->
<div class="vip-grid">
  <div class="vip-tab" onclick="selectTab(1)">VIP 1</div>
  <div class="vip-tab" onclick="selectTab(2)">VIP 2</div>
  <div class="vip-tab" onclick="selectTab(3)">VIP 3</div>
  <div class="vip-tab" onclick="selectTab(4)">VIP 4</div>
</div>

<!-- MAPA -->
<div class="mapa">
  <img src="plano.jpg">

  <div class="vip-zone" id="z1" onclick="selectZona(1)"></div>
  <div class="vip-zone" id="z2" onclick="selectZona(2)"></div>
  <div class="vip-zone" id="z3" onclick="selectZona(3)"></div>
  <div class="vip-zone" id="z4" onclick="selectZona(4)"></div>
</div>

<button type="button" onclick="enviar()">RESERVAR POR WHATSAPP</button>

</form>

</div>

</div>

<script>

let cupos = {
  "Jueves": 10,
  "Viernes": 5,
  "Sábado": 2
};

function selectZona(num){
  document.getElementById("zona").value = "VIP " + num;

  document.querySelectorAll(".vip-zone").forEach(z => z.classList.remove("active"));
  document.querySelectorAll(".vip-tab").forEach(t => t.classList.remove("active"));

  document.getElementById("z"+num).classList.add("active");
  document.querySelectorAll(".vip-tab")[num-1].classList.add("active");
}

function selectTab(num){
  selectZona(num);
}

function enviar(){
  let nombre = document.getElementById("nombre").value;
  let personas = parseInt(document.getElementById("personas").value);
  let fecha = document.getElementById("fechaEvento").value;
  let zona = document.getElementById("zona").value;

  if(!nombre || !personas || !fecha || !zona){
    alert("Completa todos los campos y selecciona zona");
    return;
  }

  if(cupos[fecha] <= 0){
    alert("Fecha agotada");
    return;
  }

  if(personas > cupos[fecha]){
    alert("No hay suficiente cupo disponible");
    return;
  }

  cupos[fecha] -= personas;

  let mensaje = `🔥 RESERVA REBECCA 🔥

👤 Nombre: ${nombre}
👥 Personas: ${personas}
📅 Fecha: ${fecha}
📍 Zona: ${zona}`;

  let numero = "573017931397";

  let url = `https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`;

  window.open(url, "_blank");
}

</script>

</body>
</html>
